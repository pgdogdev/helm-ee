env:
  # DATABASE_URL: ""
  # GOOGLE_CLIENT_ID: ""
  # GOOGLE_CLIENT_SECRET: ""
  # SESSION_KEY: ""

control:
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "4Gi"
      cpu: "1000m"

redis:
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"

networkPolicy:
  enabled: false

ingress:
  tls:
    enabled: true
  clusterIssuer: "letsencrypt-prod"
  sslRedirect: "true"
