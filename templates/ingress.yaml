{{- if .Values.ingress.enabled }}
{{- $mode := .Values.ingress.mode | default "default" }}
{{- if not (has $mode (list "aws" "nginx" "gateway" "default")) }}
{{- fail (printf "ingress.mode must be one of: aws, nginx, gateway, default (got %q)" $mode) }}
{{- end }}
{{- if eq $mode "default" }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "pgdog-control.control.fullname" . }}
  labels:
    {{- include "pgdog-control.labels" . | nindent 4 }}
    {{- with .Values.ingress.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.ingressClassName }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
  - {{ with .Values.ingress.host }}host: {{ . }}
    {{ end }}http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "pgdog-control.control.fullname" . }}
            port:
              number: 80
{{- end }}
{{- end }}
