apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pgdog-control.redis.fullname" . }}
  labels:
    {{- include "pgdog-control.redis.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "pgdog-control.redis.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pgdog-control.redis.selectorLabels" . | nindent 8 }}
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
    spec:
      automountServiceAccountToken: false
      {{- with .Values.redis.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: redis
        image: redis:7-alpine
        {{- with .Values.redis.containerSecurityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        ports:
        - containerPort: 6379
          name: redis
        resources:
          requests:
            memory: {{ .Values.redis.resources.requests.memory | quote }}
            cpu: {{ .Values.redis.resources.requests.cpu | quote }}
          limits:
            memory: {{ .Values.redis.resources.limits.memory | quote }}
            cpu: {{ .Values.redis.resources.limits.cpu | quote }}
