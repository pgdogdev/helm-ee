{{- $auth := .Values.control.config.auth | default dict -}}
{{- $cookieSecret := "" -}}
{{- if $auth.cookie_secret -}}
{{- $cookieSecret = $auth.cookie_secret -}}
{{- else -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (printf "%s-secrets" .Release.Name) -}}
{{- if and $existing (index $existing.data "cookie_secret") -}}
{{- $cookieSecret = index $existing.data "cookie_secret" | b64dec -}}
{{- end -}}
{{- end -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pgdog-control.control.fullname" . }}-config
  labels:
    {{- include "pgdog-control.labels" . | nindent 4 }}
data:
  control.toml: |
    {{- with .Values.control.config.rds }}
    [rds]
    {{- with .refresh_interval_secs }}
    refresh_interval_secs = {{ . }}
    {{- end }}
    {{- end }}

    {{- with .Values.control.config.kube }}

    [kube]
    {{- with .refresh_interval_secs }}
    refresh_interval_secs = {{ . }}
    {{- end }}
    {{- end }}

    {{- with .Values.control.config.dns }}

    [dns]
    {{- with .refresh_interval_secs }}
    refresh_interval_secs = {{ . }}
    {{- end }}
    {{- end }}

    {{- with .Values.control.config.cloudwatch }}

    [cloudwatch]
    {{- with .refresh_interval_secs }}
    refresh_interval_secs = {{ . }}
    {{- end }}
    {{- with .lookback_secs }}
    lookback_secs = {{ . }}
    {{- end }}
    {{- with .period_secs }}
    period_secs = {{ . }}
    {{- end }}
    {{- end }}

    {{- with .Values.control.config.store }}

    [store]
    {{- with .tick_secs }}
    tick_secs = {{ . }}
    {{- end }}
    {{- with .stale_after_secs }}
    stale_after_secs = {{ . }}
    {{- end }}
    {{- with .evict_after_secs }}
    evict_after_secs = {{ . }}
    {{- end }}
    {{- with .metrics_retention_secs }}
    metrics_retention_secs = {{ . }}
    {{- end }}
    {{- end }}

    {{- with .Values.control.config.helm }}

    [helm]
    {{- with .chart }}
    chart = {{ . | quote }}
    {{- end }}
    {{- with .repo }}
    repo = {{ . | quote }}
    {{- end }}
    {{- end }}

    {{- if or $cookieSecret (gt (len $auth) 0) }}

    [auth]
    {{- if $cookieSecret }}
    cookie_secret = {{ $cookieSecret | quote }}
    {{- end }}
    {{- with $auth.redirect_base_url }}
    redirect_base_url = {{ . | quote }}
    {{- end }}
    {{- if hasKey $auth "cookie_secure" }}
    cookie_secure = {{ $auth.cookie_secure }}
    {{- end }}
    {{- with $auth.session_max_age_days }}
    session_max_age_days = {{ . }}
    {{- end }}
    {{- with $auth.state_max_age_min }}
    state_max_age_min = {{ . }}
    {{- end }}
    {{- with $auth.github }}

    [auth.github]
    {{- with .client_id }}
    client_id = {{ . | quote }}
    {{- end }}
    {{- with .client_secret }}
    client_secret = {{ . | quote }}
    {{- end }}
    {{- with .allowed_orgs }}
    allowed_orgs = [{{ range $i, $org := . }}{{ if $i }}, {{ end }}{{ $org | quote }}{{ end }}]
    {{- end }}
    {{- end }}
    {{- with $auth.google }}

    [auth.google]
    {{- with .client_id }}
    client_id = {{ . | quote }}
    {{- end }}
    {{- with .client_secret }}
    client_secret = {{ . | quote }}
    {{- end }}
    {{- with .allowed_domains }}
    allowed_domains = [{{ range $i, $d := . }}{{ if $i }}, {{ end }}{{ $d | quote }}{{ end }}]
    {{- end }}
    {{- end }}
    {{- end }}

    {{- $redis := .Values.control.config.redis | default dict }}
    {{- $redisUrl := $redis.url | default (printf "redis://%s.%s.svc.cluster.local:6379" (include "pgdog-control.redis.fullname" .) .Release.Namespace) }}

    [redis]
    url = {{ $redisUrl | quote }}
    {{- with $redis.save_interval_secs }}
    save_interval_secs = {{ . }}
    {{- end }}
