apiVersion: v1
kind: Service
metadata:
  name: {{ include "pgdog-control.redis.fullname" . }}
  labels:
    {{- include "pgdog-control.redis.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
    name: redis
  selector:
    {{- include "pgdog-control.redis.selectorLabels" . | nindent 4 }}
