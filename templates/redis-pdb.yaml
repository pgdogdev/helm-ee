apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "pgdog-control.redis.fullname" . }}
  labels:
    {{- include "pgdog-control.redis.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "pgdog-control.redis.selectorLabels" . | nindent 6 }}
