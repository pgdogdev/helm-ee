apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-control
  labels:
    app: {{ .Release.Name }}-control
spec:
  replicas: {{ .Values.control.replicas | default 1 }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-control
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/restartedAt: {{ now | date "2006-01-02T15:04:05Z07:00" | quote }}
      labels:
        app: {{ .Release.Name }}-control
    spec:
      {{- if gt (int (.Values.control.replicas | default 1)) 1 }}
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: {{ .Release.Name }}-control
      {{- end }}
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: control
        image: ghcr.io/pgdogdev/pgdog-enterprise/control:{{ .Values.image.tag | default .Chart.AppVersion }}
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        env:
        {{- range $key, $value := .Values.env }}
        {{- if and (ne $key "REDIS_URL") (ne $key "FRONTEND_URL") (ne $key "GOOGLE_REDIRECT_URL") (ne $key "SESSION_KEY") }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- end }}
        - name: SESSION_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: SESSION_KEY
        - name: REDIS_URL
          value: "redis://{{ .Release.Name }}-redis.{{ .Release.Namespace }}.svc.cluster.local:6379"
        - name: FRONTEND_URL
          value: "https://{{ .Values.ingress.host }}"
        - name: GOOGLE_REDIRECT_URL
          value: "https://{{ .Values.ingress.host }}/google/oauth/callback"
        - name: GITHUB_REDIRECT_URL
          value: "https://{{ .Values.ingress.host }}/github/oauth/callback"
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: {{ .Values.control.resources.requests.memory | quote }}
            cpu: {{ .Values.control.resources.requests.cpu | quote }}
          limits:
            memory: {{ .Values.control.resources.limits.memory | quote }}
            cpu: {{ .Values.control.resources.limits.cpu | quote }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
