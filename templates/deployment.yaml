apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pgdog-control.control.fullname" . }}
  labels:
    {{- include "pgdog-control.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.control.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "pgdog-control.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll the deployment when any rendered config / secret content
        # changes. Each annotation hashes the *template output*, not
        # values directly, so transformations applied inside the
        # template (defaults, lookups, randAlphaNum on first install)
        # are accounted for. Chart-scoped keys avoid colliding with
        # `kubectl rollout restart`'s `kubectl.kubernetes.io/restartedAt`
        # under server-side apply.
        #
        # `checksum/config` covers control.toml — which includes the
        # rendered `cookie_secret` — so auth/secret rotation already
        # falls under this hash.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.control.aws.accessKeyId }}
        # AWS creds live in their own Secret, mounted via envFrom, so a
        # config change there wouldn't otherwise propagate to running
        # pods.
        checksum/aws-creds: {{ include (print $.Template.BasePath "/aws-secret.yaml") . | sha256sum }}
        {{- end }}
      labels:
        {{- include "pgdog-control.selectorLabels" . | nindent 8 }}
    spec:
      {{- if gt (int (.Values.control.replicas | default 1)) 1 }}
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            {{- include "pgdog-control.selectorLabels" . | nindent 12 }}
      {{- end }}
      {{- if .Values.control.rbac.create }}
      serviceAccountName: {{ include "pgdog-control.control.serviceAccountName" . }}
      automountServiceAccountToken: true
      {{- else }}
      automountServiceAccountToken: false
      {{- end }}
      {{- with .Values.control.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: control
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        {{- with .Values.control.containerSecurityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        env:
        - name: CONTROL_CONFIG
          value: /etc/pgdog-control/control.toml
        - name: HOME
          value: /var/lib/pgdog-control
        - name: XDG_CACHE_HOME
          value: /var/lib/pgdog-control/.cache
        - name: XDG_CONFIG_HOME
          value: /var/lib/pgdog-control/.config
        - name: XDG_DATA_HOME
          value: /var/lib/pgdog-control/.local/share
        - name: HELM_CACHE_HOME
          value: /var/lib/pgdog-control/helm/cache
        - name: HELM_CONFIG_HOME
          value: /var/lib/pgdog-control/helm/config
        - name: HELM_DATA_HOME
          value: /var/lib/pgdog-control/helm/data
        # The control plane uses these to look up the Service that fronts
        # this pod (src/models/deployment/kube/whoami.rs); without them
        # endpoint() falls back to the host.minikube.internal dev URL.
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        {{- with .Values.control.aws.region }}
        - name: AWS_REGION
          value: {{ . | quote }}
        {{- end }}
        {{- $auth := (.Values.control.config | default dict).auth | default dict }}
        {{- with $auth.github }}
        {{- with .secret }}
        # OAuth credentials sourced from an existing Secret. The control
        # plane reads these env vars as defaults when the matching field is
        # absent from control.toml (enterprise/control2/src/config.rs).
        {{- if .clientIdKey }}
        - name: GITHUB_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: {{ required "control.config.auth.github.secret.name is required when clientIdKey is set" .name | quote }}
              key: {{ .clientIdKey | quote }}
        {{- end }}
        {{- if .clientSecretKey }}
        - name: GITHUB_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ required "control.config.auth.github.secret.name is required when clientSecretKey is set" .name | quote }}
              key: {{ .clientSecretKey | quote }}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- with $auth.google }}
        {{- with .secret }}
        {{- if .clientIdKey }}
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: {{ required "control.config.auth.google.secret.name is required when clientIdKey is set" .name | quote }}
              key: {{ .clientIdKey | quote }}
        {{- end }}
        {{- if .clientSecretKey }}
        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ required "control.config.auth.google.secret.name is required when clientSecretKey is set" .name | quote }}
              key: {{ .clientSecretKey | quote }}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- if .Values.control.aws.accessKeyId }}
        envFrom:
        - secretRef:
            name: {{ include "pgdog-control.control.fullname" . }}-aws-creds
        {{- end }}
        volumeMounts:
        - name: config
          mountPath: /etc/pgdog-control
          readOnly: true
        - name: runtime
          mountPath: /var/lib/pgdog-control
        - name: tmp
          mountPath: /tmp
        ports:
        - containerPort: {{ .Values.control.port }}
          name: http
        resources:
          requests:
            memory: {{ .Values.control.resources.requests.memory | quote }}
            cpu: {{ .Values.control.resources.requests.cpu | quote }}
          limits:
            memory: {{ .Values.control.resources.limits.memory | quote }}
            cpu: {{ .Values.control.resources.limits.cpu | quote }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: {{ .Values.control.port }}
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: {{ .Values.control.port }}
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: config
        configMap:
          name: {{ include "pgdog-control.control.fullname" . }}-config
          items:
          - key: control.toml
            path: control.toml
      - name: runtime
        emptyDir: {}
      - name: tmp
        emptyDir: {}
