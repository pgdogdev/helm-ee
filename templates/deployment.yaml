apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pgdog-control.control.fullname" . }}
  labels:
    {{- include "pgdog-control.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.control.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "pgdog-control.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll the deployment when the rendered configmap changes. Uses
        # a chart-scoped key so it doesn't fight `kubectl rollout restart`
        # over `kubectl.kubernetes.io/restartedAt` under server-side apply.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "pgdog-control.selectorLabels" . | nindent 8 }}
    spec:
      {{- if gt (int (.Values.control.replicas | default 1)) 1 }}
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            {{- include "pgdog-control.selectorLabels" . | nindent 12 }}
      {{- end }}
      {{- if .Values.control.rbac.create }}
      serviceAccountName: {{ include "pgdog-control.control.serviceAccountName" . }}
      automountServiceAccountToken: true
      {{- else }}
      automountServiceAccountToken: false
      {{- end }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: control
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        env:
        - name: CONTROL_CONFIG
          value: /etc/pgdog-control/control.toml
        # control2's whoami uses these to look up the Service that fronts
        # this pod (src/models/deployment/kube/whoami.rs); without them
        # endpoint() falls back to the host.minikube.internal dev URL.
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        {{- with .Values.control.aws.region }}
        - name: AWS_REGION
          value: {{ . | quote }}
        {{- end }}
        {{- if .Values.control.aws.accessKeyId }}
        envFrom:
        - secretRef:
            name: {{ include "pgdog-control.control.fullname" . }}-aws-creds
        {{- end }}
        volumeMounts:
        - name: config
          mountPath: /etc/pgdog-control
          readOnly: true
        ports:
        - containerPort: {{ .Values.control.port }}
          name: http
        resources:
          requests:
            memory: {{ .Values.control.resources.requests.memory | quote }}
            cpu: {{ .Values.control.resources.requests.cpu | quote }}
          limits:
            memory: {{ .Values.control.resources.limits.memory | quote }}
            cpu: {{ .Values.control.resources.limits.cpu | quote }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: {{ .Values.control.port }}
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: {{ .Values.control.port }}
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: config
        configMap:
          name: {{ include "pgdog-control.control.fullname" . }}-config
          items:
          - key: control.toml
            path: control.toml
