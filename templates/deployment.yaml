apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pgdog-control.control.fullname" . }}
  labels:
    {{- include "pgdog-control.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.control.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "pgdog-control.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll the deployment when any rendered config / secret content
        # changes. Each annotation hashes the *template output*, not
        # values directly, so transformations applied inside the
        # template (defaults, lookups, randAlphaNum on first install)
        # are accounted for. Chart-scoped keys avoid colliding with
        # `kubectl rollout restart`'s `kubectl.kubernetes.io/restartedAt`
        # under server-side apply.
        #
        # `checksum/config` covers control.toml — which includes the
        # rendered `cookie_secret` — so auth/secret rotation already
        # falls under this hash.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.control.aws.accessKeyId }}
        # AWS creds live in their own Secret, mounted via envFrom, so a
        # config change there wouldn't otherwise propagate to running
        # pods.
        checksum/aws-creds: {{ include (print $.Template.BasePath "/aws-secret.yaml") . | sha256sum }}
        {{- end }}
      labels:
        {{- include "pgdog-control.selectorLabels" . | nindent 8 }}
    spec:
      {{- if gt (int (.Values.control.replicas | default 1)) 1 }}
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            {{- include "pgdog-control.selectorLabels" . | nindent 12 }}
      {{- end }}
      {{- if .Values.control.rbac.create }}
      serviceAccountName: {{ include "pgdog-control.control.serviceAccountName" . }}
      automountServiceAccountToken: true
      {{- else }}
      automountServiceAccountToken: false
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: control
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        env:
        - name: CONTROL_CONFIG
          value: /etc/pgdog-control/control.toml
        # control2's whoami uses these to look up the Service that fronts
        # this pod (src/models/deployment/kube/whoami.rs); without them
        # endpoint() falls back to the host.minikube.internal dev URL.
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        {{- with .Values.control.aws.region }}
        - name: AWS_REGION
          value: {{ . | quote }}
        {{- end }}
        {{- if .Values.control.aws.accessKeyId }}
        envFrom:
        - secretRef:
            name: {{ include "pgdog-control.control.fullname" . }}-aws-creds
        {{- end }}
        volumeMounts:
        - name: config
          mountPath: /etc/pgdog-control
          readOnly: true
        ports:
        - containerPort: {{ .Values.control.port }}
          name: http
        resources:
          requests:
            memory: {{ .Values.control.resources.requests.memory | quote }}
            cpu: {{ .Values.control.resources.requests.cpu | quote }}
          limits:
            memory: {{ .Values.control.resources.limits.memory | quote }}
            cpu: {{ .Values.control.resources.limits.cpu | quote }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: {{ .Values.control.port }}
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: {{ .Values.control.port }}
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: config
        configMap:
          name: {{ include "pgdog-control.control.fullname" . }}-config
          items:
          - key: control.toml
            path: control.toml
