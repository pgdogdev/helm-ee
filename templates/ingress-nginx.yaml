{{- if and .Values.ingress.enabled (eq (.Values.ingress.mode | default "default") "nginx") }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "pgdog-control.control.fullname" . }}
  labels:
    {{- include "pgdog-control.labels" . | nindent 4 }}
    {{- with .Values.ingress.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- if .Values.ingress.nginx.tls.enabled }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.nginx.clusterIssuer }}
    nginx.ingress.kubernetes.io/ssl-redirect: {{ .Values.ingress.nginx.sslRedirect | quote }}
  {{- end }}
spec:
  ingressClassName: nginx
  {{- if .Values.ingress.nginx.tls.enabled }}
  tls:
  - hosts:
    - {{ .Values.ingress.host }}
    secretName: {{ .Release.Name }}-control-tls
  {{- end }}
  rules:
  - {{ with .Values.ingress.host }}host: {{ . }}
    {{ end }}http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "pgdog-control.control.fullname" . }}
            port:
              number: 80
{{- end }}
