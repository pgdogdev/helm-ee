apiVersion: v1
kind: Service
metadata:
  name: {{ include "pgdog-control.control.fullname" . }}
  labels:
    {{- include "pgdog-control.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: {{ .Values.control.port }}
    protocol: TCP
    name: http
  selector:
    {{- include "pgdog-control.selectorLabels" . | nindent 4 }}
